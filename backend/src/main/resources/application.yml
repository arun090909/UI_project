server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: waypoint-employer-portal
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/waypoint_portal}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    # Set JWT_SECRET in production. Use at least 32 bytes.
    secret: ${JWT_SECRET:dev-only-change-this-secret-before-production}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    # Splunk can ingest these structured key/value fields from application logs.
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%level service=${spring.application.name} trace=%X{traceId:-} message=%msg%n"
